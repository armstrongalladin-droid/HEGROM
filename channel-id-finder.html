<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel ID Finder - Heavenly Glory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            background: #007bff;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .channel-id {
            font-family: monospace;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 3px;
            font-weight: bold;
        }
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 1.5rem;
            border-radius: 5px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 YouTube Channel ID Finder</h1>
        
        <div class="instructions">
            <h3>📋 Instructions:</h3>
            <ol>
                <li>Get a YouTube Data API key from <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a></li>
                <li>Enter your API key below</li>
                <li>Enter the channel username (e.g., "MichaelMuriithi-y5u")</li>
                <li>Click "Find Channel ID"</li>
                <li>Copy the Channel ID for your website configuration</li>
            </ol>
        </div>

        <div class="input-group">
            <label for="apiKey">YouTube API Key:</label>
            <input type="text" id="apiKey" placeholder="AIzaSyBh8IXb4L1OZTOtvqiyPcDMfHgjk85Kosg">
        </div>

        <div class="input-group">
            <label for="username">Channel Username:</label>
            <input type="text" id="username" placeholder="MichaelMuriithi-y5u" value="MichaelMuriithi-y5u">
        </div>

        <button onclick="findChannelId()">Find Channel ID</button>

        <div id="result"></div>
    </div>

    <script>
        async function findChannelId() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const username = document.getElementById('username').value.trim();
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                showResult('Please enter your YouTube API key', 'error');
                return;
            }

            if (!username) {
                showResult('Please enter the channel username', 'error');
                return;
            }

            showResult('Searching for channel ID...', 'info');

            try {
                const url = `https://www.googleapis.com/youtube/v3/channels?part=id&forUsername=${username}&key=${apiKey}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const channelId = data.items[0].id;
                    showResult(
                        `✅ Channel ID found: <span class="channel-id">${channelId}</span><br><br>
                        <strong>Configuration:</strong><br>
                        API_KEY: "${apiKey}"<br>
                        CHANNEL_ID: "${channelId}"<br><br>
                        Copy these values to your latest-sermons.html file.`,
                        'success'
                    );
                } else {
                    showResult('No channel found with that username. Please check the username and try again.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('403')) {
                    showResult('API key is invalid or YouTube Data API is not enabled. Please check your API key and ensure YouTube Data API v3 is enabled in Google Cloud Console.', 'error');
                } else if (error.message.includes('400')) {
                    showResult('Invalid request. Please check the API key format and username.', 'error');
                } else {
                    showResult(`Error: ${error.message}`, 'error');
                }
            }
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;
        }

        // Auto-fill username from URL if present
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            if (username) {
                document.getElementById('username').value = username;
            }
        });
    </script>
</body>
</html>
